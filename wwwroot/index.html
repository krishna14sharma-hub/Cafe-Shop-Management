<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora Cafe | Artisan Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="script.css?v=2.0">
</head>
<body>
    <header class="top-bar">
        <div class="logo">Agora Cafe</div>
        <div class="search-container">
            <input type="text" placeholder="Search for coffee or meals..">
        </div>
        <div class="utility-icons">
            <span id="theme-btn" class="icon-wrapper"><i class="fa-solid fa-moon"></i></span>
            <span class="icon-wrapper cart-container">
                <i class="fa-solid fa-cart-shopping"></i>
                <small id="cartCount">0</small>
            </span>
            <span class="icon-wrapper"><i class="fa-solid fa-calendar-days"></i></span>
            <span class="icon-wrapper"><i class="fa-solid fa-user"></i></span>
        </div>
    </header>

    <nav class="main-nav">
        <ul class="nav-links">
            <li><a href="#" data-page="home">HOME</a></li>
            <li><a href="#gallery" data-page="gallery">GALLERY</a></li>
            <li><a href="#feedback" data-page="feedback">FEEDBACK</a></li>
            <li><a href="#about" data-page="about">ABOUT</a></li>
            <li><a href="#contact" data-page="contact">CONTACT</a></li>
        </ul>
    </nav>

    <main id="app"></main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
